<!DOCTYPE html>
<html lang="zh">
<head>
    <title>TradingView Chart with Python Terminal</title>
    <meta charset="utf-8" name="viewport" content=
    "width=device-width,initial-scale=1.0,maximum-scale=1.0,minimum-scale=1.0">

    <script type="text/javascript" src=
    "{{url_for('charting_library',path='/charting_library.standalone.js')}}"></script>
    <link rel="stylesheet" href=
    "https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        /* ----- 现代化全局重置 & 变量 ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0b0e14;
        }

        /* 等宽字体用于代码 */
        .terminal-input, .output-line, .terminal-prompt, .example-chip {
            font-family: 'JetBrains Mono', 'Fira Code', 'Monaco', 'Consolas', 'Courier New', monospace;
        }

        /* 分割容器 — 现代化渐变背景 */
        .split-container {
            display: flex;
            width: 100%;
            height: 100%;
            position: relative;
            background: radial-gradient(circle at 20% 30%, #1a1f2b, #0f131a);
        }

        /* ----- 图表区域 (左侧) ----- */
        .chart-area {
            flex: 1;
            height: 100%;
            position: relative;
            background: #131821;
            border-radius: 0 20px 20px 0;
            overflow: hidden;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05), 0 8px 30px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(2px);
            margin: 8px 0 8px 8px;
            transition: box-shadow 0.3s ease;
        }

        .chart-area:hover {
            box-shadow: inset 0 0 0 1px rgba(100, 150, 255, 0.15), 0 12px 40px rgba(0, 0, 0, 0.7);
        }

        #tv_chart_container {
            width: 100%;
            height: 100%;
            border-radius: inherit;
        }

        /* ----- 右侧终端 — 毛玻璃 + 现代卡片 ----- */
        .terminal-sidebar {
            width: 420px;
            min-width: 240px;
            max-width: 850px;
            height: 100%;
            background: rgba(18, 25, 35, 0.85);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-left: 1px solid rgba(72, 120, 255, 0.2);
            box-shadow: -5px 0 30px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(255, 255, 255, 0.03);
            margin: 8px 8px 8px 0;
            border-radius: 20px;
            transition: all 0.2s;
        }

        /* 分隔条 — 极简科幻 */
        .splitter {
            width: 6px;
            height: 100%;
            background: transparent;
            cursor: col-resize;
            z-index: 25;
            position: relative;
            transition: background 0.2s;
            margin: 8px 0;
        }

        .splitter::after {
            content: '';
            position: absolute;
            top: 10%;
            left: 2px;
            width: 2px;
            height: 80%;
            background: rgba(120, 160, 255, 0.2);
            border-radius: 2px;
            transition: all 0.2s;
        }

        .splitter:hover::after,
        .splitter.active::after {
            background: #3b82f6;
            box-shadow: 0 0 12px #3b82f6;
            width: 3px;
            left: 1.5px;
        }

        /* ----- 终端内部组件 ----- */
        .terminal-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            background: transparent;
            color: #e3e9f5;
        }

        .terminal-header {
            padding: 16px 18px 12px;
            background: transparent;
            border-bottom: 1px solid rgba(100, 150, 255, 0.18);
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .terminal-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .terminal-title i {
            color: #3b82f6;
            font-size: 20px;
            filter: drop-shadow(0 0 6px #3b82f680);
        }

        .terminal-title span {
            background: linear-gradient(135deg, #a0c0ff, #6ea8fe);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 600;
        }

        .terminal-controls {
            display: flex;
            gap: 10px;
        }

        .terminal-btn {
            background: rgba(40, 55, 80, 0.6);
            color: #d0e0ff;
            border: 0.5px solid rgba(100, 160, 255, 0.25);
            border-radius: 30px;
            padding: 6px 16px;
            font-family: inherit;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.2s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        }

        .terminal-btn:hover {
            background: rgba(60, 90, 140, 0.7);
            border-color: #3b82f6;
            color: white;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.25);
            transform: translateY(-1px);
        }

        .terminal-btn.primary {
            background: linear-gradient(145deg, #1e4bd2, #3b82f6);
            border: none;
            color: white;
            box-shadow: 0 4px 12px #1e4bd280;
        }

        .terminal-btn.primary:hover {
            background: linear-gradient(145deg, #2563eb, #6094fa);
            box-shadow: 0 6px 16px #3b82f6b3;
        }

        /* 代码编辑区 — 类IDE */
        .terminal-code-area {
            flex: 1;
            padding: 18px 16px;
            background: rgba(8, 14, 22, 0.4);
            border-bottom: 1px solid rgba(72, 120, 255, 0.15);
            display: flex;
            flex-direction: column;
        }

        .terminal-prompt {
            color: #6abf69;
            margin-right: 10px;
            user-select: none;
            font-weight: 600;
            text-shadow: 0 0 8px #6abf6980;
        }

        .terminal-input {
            width: 100%;
            flex: 1;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(100, 160, 255, 0.2);
            border-radius: 14px;
            color: #e2e9ff;
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            outline: none;
            padding: 16px;
            tab-size: 4;
            backdrop-filter: blur(5px);
            transition: border 0.2s, box-shadow 0.2s;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.4);
        }

        .terminal-input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25), inset 0 2px 8px #0000004d;
        }

        .terminal-input::placeholder {
            color: #6f85a0;
            font-style: italic;
            opacity: 0.7;
        }

        /* 示例chips — 胶囊标签 */
        .examples-bar {
            padding: 12px 16px;
            background: rgba(10, 18, 28, 0.5);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .example-chip {
            padding: 5px 14px;
            background: rgba(30, 45, 70, 0.6);
            border: 0.5px solid rgba(80, 140, 255, 0.3);
            border-radius: 40px;
            color: #b4ccff;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            backdrop-filter: blur(8px);
            transition: all 0.15s;
            box-shadow: 0 2px 6px #0000001a;
        }

        .example-chip:hover {
            background: #2e4a8e;
            border-color: #3b82f6;
            color: white;
            transform: scale(1.02);
            box-shadow: 0 4px 10px #1e3a8a80;
        }

        /* 输出区域 — 类终端历史 */
        .terminal-output-area {
            height: 220px;
            background: rgba(4, 10, 18, 0.7);
            backdrop-filter: blur(10px);
            border-top: 1px solid #2a3a55;
            overflow-y: auto;
            padding: 12px 16px;
            font-size: 13px;
            scroll-behavior: smooth;
        }

        /* 自定义滚动条 */
        .terminal-output-area::-webkit-scrollbar {
            width: 6px;
        }

        .terminal-output-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .terminal-output-area::-webkit-scrollbar-thumb {
            background: #3a506e;
            border-radius: 10px;
        }

        .output-line {
            margin: 6px 0;
            padding: 8px 12px;
            border-radius: 10px;
            background: rgba(20, 30, 45, 0.4);
            backdrop-filter: blur(5px);
            border-left: 4px solid;
            white-space: pre-wrap;
            word-break: break-word;
            transition: background 0.15s;
            box-shadow: 0 1px 3px #0000001a;
        }

        .output-line.success {
            border-left-color: #10b981;
            background: rgba(16, 185, 129, 0.08);
        }

        .output-line.error {
            border-left-color: #f43f5e;
            background: rgba(244, 63, 94, 0.08);
        }

        .output-line.info {
            border-left-color: #3b82f6;
            background: rgba(59, 130, 246, 0.08);
        }

        .output-line.warning {
            border-left-color: #fbbf24;
            background: rgba(251, 191, 36, 0.08);
        }

        /* 状态栏 — 极简状态 */
        .terminal-status-bar {
            padding: 10px 18px;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            border-top: 1px solid #2a3a55;
            font-size: 12px;
            color: #9ab3d0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 10px;
            background: #f87171;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 6px currentColor;
            transition: all 0.3s;
        }

        .status-dot.connected {
            background: #10b981;
            box-shadow: 0 0 12px #10b981;
            animation: pulse-glow 2s infinite;
        }

        @keyframes pulse-glow {
            0% {
                opacity: 0.9;
                box-shadow: 0 0 5px #10b981;
            }
            50% {
                opacity: 1;
                box-shadow: 0 0 16px #34d399;
            }
            100% {
                opacity: 0.9;
                box-shadow: 0 0 5px #10b981;
            }
        }

        #connectionInfo {
            font-weight: 500;
            background: #1e2b41;
            padding: 2px 12px;
            border-radius: 40px;
            color: #b9d1ff;
        }

        /* 响应式 — 移动端优化 */
        @media (max-width: 800px) {
            .split-container {
                flex-direction: column;
            }

            .chart-area {
                margin: 8px 8px 0 8px;
                border-radius: 20px 20px 0 0;
                height: 55%;
            }

            .terminal-sidebar {
                width: 100% !important;
                max-width: 100%;
                height: 45%;
                margin: 0 8px 8px 8px;
                border-radius: 0 0 20px 20px;
                border-left: none;
                border-top: 1px solid rgba(72, 120, 255, 0.25);
            }

            .splitter {
                width: 100%;
                height: 6px;
                cursor: row-resize;
                margin: 0;
            }

            .splitter::after {
                top: 2px;
                left: 10%;
                width: 80%;
                height: 2px;
            }
        }

        /* 辅助 — 隐藏原始内联样式中过时的部分（由新样式覆盖） */
        .terminal-sidebar .terminal-container .terminal-header,
        .terminal-sidebar .terminal-container .terminal-code-area {
            background: transparent; /* 确保透明让毛玻璃透出 */
        }

    </style>
</head>
<body>
    <div class="split-container">
        <!-- 左侧终端区域 -->
        <div class="chart-area">
            <div id="tv_chart_container"></div>
        </div><!-- 可拖动分隔条 -->
        <div class="splitter" id="splitter"></div><!-- 右侧图表区域 -->
        <div class="terminal-sidebar" id="terminalSidebar">
            <div class="terminal-container">
                <div class="terminal-header">
                    <div class="terminal-title">
                        <span>🐍</span> Python 终端
                    </div>
                    <div class="terminal-controls">
                        <button class="terminal-btn" onclick=
                        "window.pythonWidget.clearCode()">清空</button>
                        <button class="terminal-btn primary"
                        onclick="window.pythonWidget.executeCode()"
                        id="executeBtn">执行 (Ctrl+Enter)</button>
                    </div>
                </div>
                <div class="terminal-code-area">
                    <div style=
                    "display: flex; align-items: center; margin-bottom: 4px;">
                        <span class=
                        "terminal-prompt">&gt;&gt;&gt;</span>
                    </div>
                    <textarea class="terminal-input" id="codeInput"
                    placeholder="# 在这里输入Python代码..." spellcheck=
                    "false"></textarea>
                </div>
                <div class="examples-bar">
                    <span class="example-chip" onclick=
                    "window.pythonWidget.loadExample('basic')">基础</span>
                    <span class="example-chip" onclick=
                    "window.pythonWidget.loadExample('chart')">图表分析</span>
                    <span class="example-chip" onclick=
                    "window.pythonWidget.loadExample('indicators')">
                    技术指标</span> <span class="example-chip" onclick=
                    "window.pythonWidget.loadExample('trend')">趋势分析</span>
                </div>
                <div class="terminal-output-area" id="outputArea">
                    <div class="output-line info" style="border-left-color: #569cd6;">就绪 - 输入代码并点击执行</div>
                </div>
                <div class="terminal-status-bar">
                    <div>
                        <span class="status-dot" id=
                        "statusDot"></span> <span id=
                        "statusText">连接中...</span>
                    </div>
                    <div id="connectionInfo">
                        Python 3.x
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script type="text/javascript">
    // ============ 工具函数 ============
    function hexToRgba(hex, alpha = 1) {
        hex = hex.replace(/^#/, '');
        let r = parseInt(hex.substring(0, 2), 16);
        let g = parseInt(hex.substring(2, 4), 16);
        let b = parseInt(hex.substring(4, 6), 16);
        return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function rgbaToHex(rgbaStr) {
        const values = rgbaStr.match(/\d+(\.\d+)?/g).map(Number);
        const [r, g, b] = values.slice(0, 3);
        const hex = ((r << 16) | (g << 8) | b).toString(16).padStart(6, '0');
        return `#${hex}`;
    }

    function invertAlphaToRgba(colorStr) {
        const hexPattern = /^#([0-9A-Fa-f]{3,4}|[0-9A-Fa-f]{6}|[0-9A-Fa-f]{8})$/;
        const rgbaPattern = /^rgba?\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)\s*(?:,\s*([0-9.]+)\s*)?\)$/i;

        let r, g, b, alpha;

        if (hexPattern.test(colorStr)) {
            let hex = colorStr.slice(1);
            if (hex.length === 3 || hex.length === 4) {
                hex = hex.split('').map(c => c + c).join('');
            }
            r = parseInt(hex.substring(0, 2), 16);
            g = parseInt(hex.substring(2, 4), 16);
            b = parseInt(hex.substring(4, 6), 16);
            alpha = hex.length === 8 ? parseInt(hex.substring(6, 8), 16) / 255 : 1;
        } else if (rgbaPattern.test(colorStr)) {
            const matches = colorStr.match(rgbaPattern);
            r = parseInt(matches[1], 10);
            g = parseInt(matches[2], 10);
            b = parseInt(matches[3], 10);
            alpha = matches[4] !== undefined ? parseFloat(matches[4]) : 1;
        } else {
            throw new Error('不支持的格式，请输入 HEX 或 RGBA 颜色字符串');
        }

        let newAlpha = alpha === 0 ? 1 : 0;
        return `rgba(${r}, ${g}, ${b}, ${newAlpha})`;
    }

    // ============ 配置 ============
    class Config {
        static get debug() {
            const params = new URLSearchParams(window.location.search);
            return params.get('debug') === 'true';
        }

        static get theme() {
            const params = new URLSearchParams(window.location.search);
            return params.get('theme') || "light";
        }

        static get exchange() {
            const params = new URLSearchParams(window.location.search);
            return params.get('exchange') || 'bitstamp';
        }

        static get symbol() {
            const params = new URLSearchParams(window.location.search);
            return params.get('symbol') || 'btcusd';
        }

        static get interval() {
            const params = new URLSearchParams(window.location.search);
            return params.get('interval') || '1';
        }

        static get cover() {
            const dict = new Map([
                [60, "1"],
                [180, "3"],
                [300, "5"],
                [900, "15"],
                [1800, "30"],
                [3600, "1H"],
                [7200, "2H"],
                [14400, "4h"],
                [21600, "6H"],
                [43200, "12H"],
                [86400, "1D"],
                [259200, "3D"]

            ]);
            const params = new URLSearchParams(window.location.search);
            const val = params.get('step');
            const step = Number(val);
            const o = !val || isNaN(step) ? 60 : step;
            return dict.get(Number(o)) || '1';
        }

        static get EMA_LENGTH() {
            const params = new URLSearchParams(window.location.search);
            return Number(params.get('ema')) || 31;
        }

        static get step() {
            const params = new URLSearchParams(window.location.search);
            const val = params.get('step');
            const step = Number(val);
            return !val || isNaN(step) ? 60 : step;
        }

        static get limit() {
            const params = new URLSearchParams(window.location.search);
            const val = params.get('limit');
            const limit = Number(val);
            return !val || isNaN(limit) ? 1000 : limit;
        }

        static get generator() {
            const params = new URLSearchParams(window.location.search);
            return params.get('generator') || 'False';
        }

        static get points() {
            const params = new URLSearchParams(window.location.search);
            const points = params.get('points');
            if (!points) return [];
            return points.split(',').map(Number).filter(n => !isNaN(n));
        }

        static get nonAsciiParams() {
            const params = new URLSearchParams(window.location.search);
            const result = {};
            for (const [key, value] of params.entries()) {
                if (/[^\u0020-\u007E]/.test(key)) {
                    result[key] = value;
                }
            }
            return result;
        }

        static formatPeriod(seconds) {
            const map = {
                60: '1分钟', 180: '3分钟', 300: '5分钟', 900: '15分钟', 1800: '30分钟',
                3600: '1小时', 7200: '2小时', 14400: '4小时', 21600: '6小时',
                43200: '12小时', 86400: '日线', 259200: '3日线'
            };
            return map[seconds] || `${seconds}秒`;
        }

    }

    class Utils {
        static generateClientId() {
            return 'client_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
        }

        static log(message, data = null) {
            if (Config.debug) {
                console.log(message, data || '');
            }
        }

        static error(message, error = null) {
            console.error(message, error || '');
        }

        static info(message, error = null) {
            console.info(message, error || '');
        }
    }

    // ============ 统一 WebSocket 管理器 ============
    class UnifiedWebSocketManager {
        constructor() {
            this.clientId = Utils.generateClientId();
            this.socket = null;
            this.isConnected = false;
            this.reconnectAttempts = 0;
            this.maxReconnectAttempts = 5;
            this.reconnectDelay = 3000;
            this.handlers = {chart: [], python: []};
        }

        connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            this.socket = new WebSocket(`${protocol}//${window.location.host}/ws/${this.clientId}`);

            this.socket.onopen = () => {
                Utils.log("WebSocket统一连接已建立");
                this.isConnected = true;
                this.reconnectAttempts = 0;
                this.updateConnectionStatus(true);
            };

            this.socket.onclose = () => {
                Utils.log("WebSocket连接已关闭");
                this.isConnected = false;
                this.updateConnectionStatus(false);
                this.attemptReconnect();
            };

            this.socket.onerror = (error) => {
                Utils.error("WebSocket错误:", error);
                this.isConnected = false;
                this.updateConnectionStatus(false);
            };

            this.socket.onmessage = (event) => {
                try {
                    const message = JSON.parse(event.data);
                    this.handleMessage(message);
                } catch (error) {
                    Utils.error("解析WebSocket消息失败:", error);
                }
            };
        }

        handleMessage(message) {
            Utils.log("收到消息:", message);
            const module = message.module || 'chart';
            if (module === 'python') {
                this.handlePythonMessage(message);
            } else {
                this.handleChartMessage(message);
            }
        }

        handleChartMessage(message) {
            this.handlers.chart.forEach(handler => {
                try {
                    handler(message);
                } catch (error) {
                    Utils.error("图表消息处理错误:", error);
                }
            });
        }

        handlePythonMessage(message) {
            this.handlers.python.forEach(handler => {
                try {
                    handler(message);
                } catch (error) {
                    Utils.error("Python消息处理错误:", error);
                }
            });
        }

        sendChartMessage(message) {
            this.send({...message, module: 'chart'});
        }

        sendPythonMessage(command, data = {}) {
            this.send({command, ...data, module: 'python'});
        }

        send(message) {
            if (this.socket && this.socket.readyState === WebSocket.OPEN) {
                this.socket.send(JSON.stringify(message));
            } else {
                Utils.error("WebSocket未连接，消息未发送:", message);
            }
        }

        on(module, handler) {
            if (this.handlers[module]) {
                this.handlers[module].push(handler);
            }
        }

        off(module, handler) {
            if (this.handlers[module]) {
                this.handlers[module] = this.handlers[module].filter(h => h !== handler);
            }
        }

        updateConnectionStatus(connected) {
            const event = new CustomEvent('websocket-status', {detail: {connected}});
            window.dispatchEvent(event);
        }

        attemptReconnect() {
            if (this.reconnectAttempts < this.maxReconnectAttempts) {
                this.reconnectAttempts++;
                Utils.log(`尝试重新连接 (${this.reconnectAttempts}/${this.maxReconnectAttempts})...`);
                setTimeout(() => this.connect(), this.reconnectDelay);
            } else {
                Utils.error("达到最大重连次数");
            }
        }

        disconnect() {
            if (this.socket) {
                this.socket.close();
            }
        }
    }

    // ============ Python 终端管理器 ============
    class PythonTerminalManager {
        constructor(websocketManager) {
            this.websocketManager = websocketManager;
            this.outputBuffer = [];
            this.init();
        }

        init() {
            this.bindEvents();
            this.websocketManager.on('python', (message) => {
                this.handlePythonMessage(message);
            });
            // 暴露接口供按钮调用
            window.pythonWidget = {
                executeCode: () => this.executeCode(),
                clearCode: () => this.clearCode(),
                loadExample: (name) => this.loadExample(name)
            };
        }

        bindEvents() {
            window.addEventListener('websocket-status', (event) => {
                this.updateConnectionStatus(event.detail.connected);
            });

            const input = document.getElementById('codeInput');
            input.addEventListener('keydown', (e) => {
                if (e.ctrlKey && e.key === 'Enter') {
                    e.preventDefault();
                    this.executeCode();
                }
            });
        }

        updateConnectionStatus(connected) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            const info = document.getElementById('connectionInfo');
            if (connected) {
                dot.className = 'status-dot connected';
                text.textContent = '已连接';
                info.textContent = 'Python 3.x | 在线';
            } else {
                dot.className = 'status-dot';
                text.textContent = '离线';
                info.textContent = 'Python 3.x | 连接中...';
            }
        }

        executeCode() {
            const code = document.getElementById('codeInput').value.trim();
            if (!code) {
                this.appendOutput('❌ 错误: 请输入代码', 'error');
                return;
            }

            const executeBtn = document.getElementById('executeBtn');
            executeBtn.disabled = true;
            executeBtn.textContent = '执行中...';

            this.appendOutput(`[${new Date().toLocaleTimeString()}] 开始执行...`, 'info');
            this.websocketManager.sendPythonMessage('execute', {code});
        }

        clearCode() {
            document.getElementById('codeInput').value = '';
            this.appendOutput('代码已清空', 'info');
        }

        loadExample(name) {
            const examples = {
                'basic': `# 基础示例
print("Hello TradingView!")
import math
print(f"圆周率: {math.pi}")
print(f"2的平方根: {math.sqrt(2)}")
numbers = [1, 2, 3, 4, 5]
print(f"数字列表: {numbers}")
print(f"总和: {sum(numbers)}")`,
                'chart': `# 图表分析
print("=== 图表数据分析 ===")
# 这里可以访问观察员对象，例如：
# print(观察员.笔序列)`,
                'indicators': `# 技术指标计算
print("=== 技术指标 ===")`,
                'trend': `# 趋势分析
print("=== 趋势分析 ===")
序列 = 图表展示序列(观察员)
基础序列 = 观察员.笔序列[272:281]
扩展序列 = []
线段.扩展分析(None, 基础序列, 扩展序列,观察员,观察员.配置)
中枢.分析(扩展序列,序列,观察员,False,"临时扩展_")`
            };
            if (examples[name]) {
                document.getElementById('codeInput').value = examples[name];
                this.appendOutput(`已加载 ${name} 示例`, 'info');
            }
        }

        handlePythonMessage(message) {
            const executeBtn = document.getElementById('executeBtn');
            if (executeBtn) {
                executeBtn.disabled = false;
                executeBtn.textContent = '执行 (Ctrl+Enter)';
            }

            switch (message.type) {
                case 'execution_result':
                    if (message.success) {
                        if (message.output) {
                            this.appendOutput(message.output, 'success');
                        } else {
                            this.appendOutput('✅ 执行成功（无输出）', 'success');
                        }
                    } else {
                        let errorMsg = message.error?.message || message.message || '执行错误';
                        this.appendOutput(`❌ 执行失败: ${errorMsg}`, 'error');
                        if (message.output) {
                            this.appendOutput(message.output, 'error');
                        }
                    }
                    break;
                case 'environment_info':
                    this.appendOutput(`环境信息: ${message.execution_count} 次执行`, 'info');
                    break;
                case 'environment_reset':
                    this.appendOutput(message.message, 'info');
                    break;
                case 'chart_data':
                    if (message.data.error) {
                        this.appendOutput(`图表数据错误: ${message.data.error}`, 'error');
                    } else {
                        this.appendOutput(`图表数据已更新: ${message.data.symbol}`, 'info');
                    }
                    break;
            }
        }

        appendOutput(text, type = 'info') {
            const outputArea = document.getElementById('outputArea');
            const line = document.createElement('div');
            line.className = `output-line ${type}`;
            line.textContent = text;
            outputArea.appendChild(line);
            outputArea.scrollTop = outputArea.scrollHeight;

            const lines = outputArea.getElementsByClassName('output-line');
            if (lines.length > 100) {
                lines[0].remove();
            }
        }
    }


    // ============ TradingView 图表管理器 ============

        initWidget() {

                symbol: Config.exchange + ":" + Config.symbol,

        setupChartEvents() {
            this.widget.onChartReady(() => {
                this.websocketManager.sendChartMessage({
                    type: 'ready',
                    exchange: Config.exchange,
                    symbol: Config.symbol,
                    freq: Config.step,
                    limit: Config.limit,
                    generator: Config.generator,
                    points: Config.points,
                    config: Config.nonAsciiParams
                });

                const chart = this.widget.activeChart();

                this.widget.subscribe("drawing_event", (sourceId, drawingEventType) => {
                    if (drawingEventType.indexOf("click") === 0) {
                        this.handleDrawingClick(sourceId);
                    }
                });

                // 存储最新的十字线位置
                let currentCrosshair = {time: null, price: null};

                // 订阅十字线移动事件，持续更新位置
                chart.crossHairMoved().subscribe(null, ({time, price}) => {
                    currentCrosshair = {time, price};
                });

                // 订阅全局鼠标松开事件（仅在点击时处理）
                this.widget.subscribe('mouse_up', (params) => {
                    if (currentCrosshair.time !== null) {
                        const timestamp = currentCrosshair.time; // Unix时间戳（秒）
                        const price = currentCrosshair.price;

                        console.log(`用户点击K线时间: ${timestamp}, 价格: ${price}`);

                        // 如果你有历史数据数组，可以匹配完整K线信息
                        // const bar = yourBarsData.find(b => b.time === timestamp);
                        // console.log('完整K线:', bar);
                    }
                });


            });
        }

        handleDrawingClick(sourceId) {
            try {
                const shape = this.widget.activeChart().getShapeById(sourceId);
                if (!shape) return;

                const properties = shape.getProperties();
                const points = shape.getPoints();
                const toolName = shape._source.toolname;

                Utils.info("Drawing clicked:", {toolName, properties, points});

                switch (toolName) {
                    case "LineToolTrendLine":
                        shape.setProperties({showLabel: !properties.showLabel});
                        shape.setProperties({textcolor: invertAlphaToRgba(properties.textcolor)});
                        this.websocketManager.sendChartMessage({
                            type: "query_by_index",
                            data_type: properties.title,
                            index: properties.title
                        });
                        break;
                    case "LineToolRectangle":
                        shape.setProperties({showLabel: !properties.showLabel});
                        shape.setProperties({textColor: invertAlphaToRgba(properties.textColor)});
                        this.websocketManager.sendChartMessage({
                            type: "query_by_index",
                            data_type: properties.title,
                            index: properties.title
                        });
                        break;
                    case "LineToolArrowMarkDown":
                    case "LineToolArrowMarkUp":
                        shape.setProperties({showLabel: !properties.showLabel});
                        shape.setProperties({color: invertAlphaToRgba(properties.color)});
                        break;
                    case "LineToolPath":
                        this.websocketManager.sendChartMessage({
                            type: "save_path",
                            data: properties,
                            points: points,
                            index: properties.title
                        });
                        const prices = points.map(item => Math.round(item.price));
                        const textToCopy = prices.join(', ');
                        navigator.clipboard.writeText(textToCopy)
                                .then(() => Utils.log('数据已复制到剪切板:', textToCopy))
                                .catch(err => Utils.error('复制失败:', err));
                        break;
                }
            } catch (error) {
                Utils.error("Error handling drawing click:", error);
            }
        }

        handleChartMessage(message) {
            Utils.log("处理图表消息:", message.type);
            switch (message.type) {
                case 'realtime':
                    if (this.widget && this.onRealtimeCallback) {
                        const bar = {
                            time: new Date(message.timestamp).getTime(),
                            close: message.close,
                            open: message.open,
                            high: message.high,
                            low: message.low,
                            volume: message.volume,
                        };
                        this.onRealtimeCallback(bar);
                    }
                    break;
                case 'shape':
                    if (message.cmd === "APPEND") {
                        this.addShape(message.id, message.points, message.options, message.properties);
                    } else if (message.cmd === "REMOVE") {
                        this.removeShape(message.id);
                    } else if (message.cmd === "MODIFY") {
                        this.updateShape(message.id, message.points, message.properties);
                    }
                    break;
                case 'query_result':
                    Utils.log("查询结果:", message.data);
                    break;
                case 'ready_ack':
                    Utils.log("图表分析器启动确认:", message);
                    break;
                case 'connected':
                    Utils.log("连接成功:", message);
                    break;
            }
        }

        async addShape(id, points, options, properties) {
            try {
                if (!this.widget || !this.widget.chart) {
                    return;
                }

                // 重复判断
                const existShapeId = this.shapeIds.get(id);
                if (existShapeId) {
                    // Utils.error("图形已存在", {id});
                    await this.updateShape(id, points, properties);
                    return;
                }

                // 创建图形
                const shapeId = await this.widget.chart().createMultipointShape(points, options);
                const shape = this.widget.chart().getShapeById(shapeId);

                if (!shape) {
                    Utils.error("添加形状失败：shape 为 null", {id, shapeId});
                    return;
                }

                // 设置属性
                Utils.log("shapeId:", shape.getProperties());
                shape.setProperties(properties);
                shape.bringToFront();

                // 保存映射
                this.shapeIds.set(id, shapeId);
                Utils.log("添加形状", {id, shapeId});

            } catch (error) {
                Utils.error("添加形状失败", error);
            }
        }

        async removeShape(id) {
            try {
                if (!this.widget || !this.widget.chart) return;

                const shapeId = this.shapeIds.get(id);
                if (!shapeId) {
                    Utils.log("图形不存在，无需删除", {id});
                    return;
                }

                const shape = this.widget.chart().getShapeById(shapeId);
                if (shape) {
                    await this.widget.chart().removeEntity(shapeId);
                    this.shapeIds.delete(id);
                }

                Utils.log("删除形状成功", {id});

            } catch (error) {
                Utils.error("删除形状失败", error);
            }
        }

        async updateShape(id, points, properties) {
            try {
                if (!this.widget || !this.widget.chart) return;

                const shapeId = this.shapeIds.get(id);
                if (!shapeId) {
                    Utils.error("更新失败：图形不存在", {id});
                    return;
                }

                const shape = this.widget.chart().getShapeById(shapeId);
                if (!shape) {
                    Utils.error("更新失败：未找到图形实例", {id, shapeId});
                    return;
                }

                // 更新点位
                if (points) {
                    await shape.setPoints(points);
                }

                // 更新配置与属性
                if (properties) {
                    shape.setProperties(properties);
                }

                shape.bringToFront();
                Utils.log("更新形状成功", {id});

            } catch (error) {
                Utils.error("更新形状失败", error);
            }
        }

        async hideShapesByType(targetType, shapeType) {
            try {
                if (!this.widget || !this.widget.chart) return;

                this.widget.activeChart().getAllShapes().forEach(({name, id}) => {
                    if (name === shapeType) {
                        const shape = this.widget.activeChart().getShapeById(id);
                        const properties = shape.getProperties();
                        const customId = properties.title;
                        try {
                            const [flag, period, type, index] = customId.split(':');
                            if (type.indexOf(targetType) !== -1) {
                                shape.setProperties({visible: !properties.visible});
                                // Utils.log(`已隐藏图形: ${customId}`);
                            }
                        } catch (error) {
                            Utils.log(`隐藏失败: ${customId}`);
                            Utils.error("批量隐藏图形失败", error);
                        }
                    }
                });
            } catch (error) {
                Utils.error("批量隐藏图形失败", error);
            }
        }

        createHeaderButton(text, title, clickHandler) {
            const button = this.widget.createButton();
            button.setAttribute("title", title);
            button.textContent = text;
            button.addEventListener("click", clickHandler);
        }

        setShapesVisibleByPeriod(rawType, periodSeconds, visible) {
            if (!this.widget || !this.widget.activeChart()) return;
            const allShapes = this.widget.activeChart().getAllShapes();
            allShapes.forEach(({id}) => {
                const shape = this.widget.activeChart().getShapeById(id);
                if (!shape) return;
                const props = shape.getProperties();
                const title = props.title || '';
                const parts = title.split(':');
                if (parts.length < 3) return;
                const [, periodStr, typeFromTitle] = parts;
                const periodFromTitle = Number(periodStr);
                if (typeFromTitle === rawType && periodFromTitle === periodSeconds) {
                    shape.setProperties({visible});
                }
            });
        }

        isPeriodVisible(rawType, periodSeconds) {
            if (!this.widget || !this.widget.activeChart()) return true;
            const allShapes = this.widget.activeChart().getAllShapes();
            let hasAny = false;
            for (const {id} of allShapes) {
                const shape = this.widget.activeChart().getShapeById(id);
                if (!shape) continue;
                const props = shape.getProperties();
                const title = props.title || '';
                const parts = title.split(':');
                if (parts.length < 3) continue;
                const [, periodStr, typeFromTitle] = parts;
                const periodFromTitle = Number(periodStr);
                if (typeFromTitle === rawType && periodFromTitle === periodSeconds) {
                    hasAny = true;
                    if (props.visible === false) return false;
                }
            }
            return hasAny;
        }

        /**
         * 创建动态下拉菜单（按基础类型 + 周期分组）

        setupCustomDropdown(triggerElement, widget) {
            const panel = document.createElement('div');
            panel.style.cssText = `
        position: absolute; z-index: 10000;
        background: ${widget.getTheme() === 'dark' ? '#1e2532' : '#ffffff'};

        backdrop-filter: blur(4px);

            const refreshMenu = () => {
                panel.innerHTML = '';
                if (!this.widget || !this.widget.activeChart()) return;
                const allShapes = this.widget.activeChart().getAllShapes();

                // 收集 { baseType -> Set of periods }

                const typePeriods = {}; // { rawType -> Set of periods }

                allShapes.forEach(({id}) => {
                    const shape = this.widget.activeChart().getShapeById(id);
                    if (!shape) return;
                    const props = shape.getProperties();
                    const title = props.title || '';
                    const parts = title.split(':');
                    if (parts.length < 3) return;
                    const period = Number(parts[1]);
                    const rawType = parts[2];          // 直接使用第三段
                    if (!typePeriods[rawType]) typePeriods[rawType] = new Set();
                    typePeriods[rawType].add(period);
                });

                if (Object.keys(typePeriods).length === 0) {
                    const empty = document.createElement('div');
                    empty.textContent = '暂无图形数据';
                    empty.style.padding = '12px 16px';
                    empty.style.opacity = '0.7';
                    panel.appendChild(empty);
                    return;
                }

                // 为每个基础类型创建折叠组
                Object.keys(typePeriods).sort().forEach(baseType => {
                    const section = document.createElement('div');
                    const header = document.createElement('div');
                    header.style.cssText = `
                padding: 10px 16px; cursor: pointer; display: flex; align-items: center;
                justify-content: space-between; user-select: none;
                background: ${widget.getTheme() === 'dark' ? 'rgba(255,255,255,0.03)' : 'rgba(0,0,0,0.02)'};
                border-bottom: 1px solid rgba(128,128,128,0.2);
            `;
                    header.innerHTML = `<span style="font-weight:600;">${baseType}</span><span class="toggle-arrow" style="transition: transform 0.2s;">▼</span>`;
                    const content = document.createElement('div');
                    content.style.display = 'block';

                    header.addEventListener('click', () => {
                        const arrow = header.querySelector('.toggle-arrow');
                        if (content.style.display === 'none') {
                            content.style.display = 'block';
                            arrow.style.transform = 'rotate(0deg)';
                        } else {
                            content.style.display = 'none';
                            arrow.style.transform = 'rotate(-90deg)';
                        }
                    });

                    const periods = Array.from(typePeriods[baseType]).sort((a, b) => a - b);
                    periods.forEach(period => {
                        const row = document.createElement('div');
                        row.style.cssText = `
                    padding: 6px 16px 6px 28px; display: flex; align-items: center;
                    cursor: pointer; transition: background 0.15s;
                `;
                        row.addEventListener('mouseenter', () => row.style.background = widget.getTheme() === 'dark' ? '#2a374b' : '#f0f3fa');
                        row.addEventListener('mouseleave', () => row.style.background = 'transparent');

                        const checkbox = document.createElement('input');
                        checkbox.type = 'checkbox';
                        checkbox.checked = this.isPeriodVisible(baseType, period);
                        checkbox.style.cssText = `
                    margin-right: 12px; accent-color: #2962ff;
                    width: 16px; height: 16px; cursor: pointer;
                `;

                        const label = document.createElement('span');
                        label.textContent = Config.formatPeriod(period);
                        label.style.flex = '1';

                        row.appendChild(checkbox);
                        row.appendChild(label);

                        row.addEventListener('click', (e) => {
                            if (e.target !== checkbox) {
                                checkbox.checked = !checkbox.checked;
                            }
                            this.setShapesVisibleByPeriod(baseType, period, checkbox.checked);
                        });

                        content.appendChild(row);
                    });

                    section.appendChild(header);
                    section.appendChild(content);
                    panel.appendChild(section);
                });

                // 底部全局控制按钮
                const footer = document.createElement('div');
                footer.style.cssText = `
            border-top: 1px solid ${widget.getTheme() === 'dark' ? '#3a4a6a' : '#d1d4dc'};
            padding: 8px 16px; display: flex; gap: 8px;
        `;
                const showAllBtn = document.createElement('button');
                showAllBtn.textContent = '全部显示';
                showAllBtn.style.cssText = `flex:1; padding: 4px; background: #2563eb; color:white; border:none; border-radius: 4px; cursor:pointer;`;
                showAllBtn.addEventListener('click', () => {
                    Object.keys(typePeriods).forEach(baseType => {
                        typePeriods[baseType].forEach(period => {
                            this.setShapesVisibleByPeriod(baseType, period, true);
                        });
                    });
                    refreshMenu();
                });
                const hideAllBtn = document.createElement('button');
                hideAllBtn.textContent = '全部隐藏';
                hideAllBtn.style.cssText = `flex:1; padding: 4px; background: #ef4444; color:white; border:none; border-radius: 4px; cursor:pointer;`;
                hideAllBtn.addEventListener('click', () => {
                    Object.keys(typePeriods).forEach(baseType => {
                        typePeriods[baseType].forEach(period => {
                            this.setShapesVisibleByPeriod(baseType, period, false);
                        });
                    });
                    refreshMenu();
                });
                footer.appendChild(showAllBtn);
                footer.appendChild(hideAllBtn);
                panel.appendChild(footer);
            };

            const showPanel = () => {
                refreshMenu();
                panel.style.display = 'block';
                const rect = triggerElement.getBoundingClientRect();
                // 等待 layout 完成以获取正确的 panel 宽度
                requestAnimationFrame(() => {
                    const panelWidth = panel.offsetWidth;
                    let left = rect.right - panelWidth;
                    if (left < 0) left = 5;
                    panel.style.top = `${rect.bottom + 4}px`;
                    panel.style.left = `${left}px`;
                });
            };
            const hidePanel = () => {
                panel.style.display = 'none';
            };

            triggerElement.addEventListener('click', (e) => {
                e.stopPropagation();
                panel.style.display === 'block' ? hidePanel() : showPanel();
            });
            document.addEventListener('click', (e) => {
                if (!panel.contains(e.target) && e.target !== triggerElement) hidePanel();
            });
            window.addEventListener('resize', () => {
                if (panel.style.display === 'block') showPanel();
            });

            // 保存引用以便外部强制刷新
            this.refreshDropdown = refreshMenu;
        }

        async createButton() {
            // 创建自定义按钮（注意：useTradingViewStyle 省略或设为 false）
            const customBtn = this.widget.createButton({
                align: 'right' // 可选 'left' 或 'right'
            });

            // 设置按钮内容与样式
            customBtn.innerHTML = `⚙️ 图表工具`;
            customBtn.style.cssText = `
                display: inline-flex;
                align-items: center;
                justify-content: center;
                height: 32px;
                padding: 0 12px;
                margin: 0 4px;
                border-radius: 4px;
                font-size: 14px;
                font-weight: 500;
                color: ${this.widget.getTheme() === 'dark' ? '#d1d4dc' : '#131722'};
                background: transparent;
                border: none;
                cursor: pointer;
                transition: background 0.2s, color 0.2s;
                font-family: -apple-system, BlinkMacSystemFont, 'Trebuchet MS', Roboto, Ubuntu, sans-serif;
                user-select: none;
            `;

            // 悬停效果
            customBtn.addEventListener('mouseenter', () => {
                customBtn.style.background = this.widget.getTheme() === 'dark'
                        ? 'rgba(255, 255, 255, 0.08)'
                        : 'rgba(0, 0, 0, 0.05)';
            });
            customBtn.addEventListener('mouseleave', () => {
                customBtn.style.background = 'transparent';
            });

            // 现在你可以安全地使用 customBtn 作为触发器
            this.setupCustomDropdown(customBtn, this.widget);
        }


    }

    // ============ 可拖动分隔条逻辑 ============
    function initSplitter() {
        const splitter = document.getElementById('splitter');
        const sidebar = document.getElementById('terminalSidebar');
        let isDragging = false;
        let startPos = 0;        // 记录起始坐标（水平或垂直）
        let startSize = 0;       // 记录起始尺寸
        let isVertical = window.innerWidth > 800; // 初始方向（根据响应式判断）

        // 监听窗口大小变化，更新方向
        window.addEventListener('resize', () => {
            isVertical = window.innerWidth > 800;
        });

        // 创建遮罩层（在拖动时覆盖整个页面，防止鼠标事件丢失）
        const mask = document.createElement('div');
        mask.style.position = 'fixed';
        mask.style.top = '0';
        mask.style.left = '0';
        mask.style.width = '100%';
        mask.style.height = '100%';
        mask.style.zIndex = '9999';
        mask.style.display = 'none';
        mask.style.cursor = isVertical ? 'col-resize' : 'row-resize';
        mask.style.background = 'transparent'; // 透明，不影响视觉
        document.body.appendChild(mask);

        splitter.addEventListener('mousedown', (e) => {
            e.preventDefault(); // 防止文本选择
            isDragging = true;
            splitter.classList.add('active');

            // 锁定指针到分隔条
            splitter.setPointerCapture(e.pointerId);

            // 记录起始位置和尺寸
            if (isVertical) {
                startPos = e.clientX;
                startSize = sidebar.offsetWidth;
                mask.style.cursor = 'col-resize';
            } else {
                startPos = e.clientY;
                startSize = sidebar.offsetHeight;
                mask.style.cursor = 'row-resize';
            }

            // 显示遮罩层
            mask.style.display = 'block';

            // 禁止页面选择
            document.body.style.userSelect = 'none';
        });

        splitter.addEventListener('pointermove', (e) => {
            if (!isDragging) return;

            e.preventDefault(); // 防止默认行为

            let delta, newSize;
            if (isVertical) {
                delta = e.clientX - startPos;
                newSize = startSize + delta;
                // 限制在最小和最大宽度之间
                const minWidth = parseInt(getComputedStyle(sidebar).minWidth) || 200;
                const maxWidth = parseInt(getComputedStyle(sidebar).maxWidth) || 800;
                newSize = Math.min(Math.max(newSize, minWidth), maxWidth);
                sidebar.style.width = newSize + 'px';
            } else {
                delta = e.clientY - startPos;
                newSize = startSize + delta;
                // 限制在最小和最大高度之间
                const minHeight = 150; // 可自定义
                const maxHeight = window.innerHeight - 100;
                newSize = Math.min(Math.max(newSize, minHeight), maxHeight);
                sidebar.style.height = newSize + 'px';
            }
        });

        splitter.addEventListener('pointerup', (e) => {
            if (!isDragging) return;

            isDragging = false;
            splitter.classList.remove('active');
            splitter.releasePointerCapture(e.pointerId);

            // 隐藏遮罩层
            mask.style.display = 'none';

            // 恢复页面选择
            document.body.style.userSelect = '';
        });

        // 防止指针取消（如突然失去焦点）
        splitter.addEventListener('pointercancel', (e) => {
            if (isDragging) {
                isDragging = false;
                splitter.classList.remove('active');
                splitter.releasePointerCapture(e.pointerId);
                mask.style.display = 'none';
                document.body.style.userSelect = '';
            }
        });

        // 对于触摸设备，确保触摸事件也能正常工作
        splitter.addEventListener('touchstart', (e) => {
            e.preventDefault();
            // 手动触发 mousedown 逻辑（通过事件模拟）
            const touch = e.touches[0];
            const mouseEvent = new MouseEvent('mousedown', {
                clientX: touch.clientX,
                clientY: touch.clientY,
                pointerId: 1, // 模拟 pointerId
            });
            splitter.dispatchEvent(mouseEvent);
        });
    }

    // ============ 主应用程序 ============
    class App {
        constructor() {
            this.websocketManager = new UnifiedWebSocketManager();
            this.tradingViewManager = null;
            this.pythonTerminalManager = null;
        }

        init() {
            this.websocketManager.connect();
            this.initTradingView();
            this.initPythonTerminal();
            initSplitter(); // 初始化分隔条
        }

        initTradingView() {
            if (typeof TradingView === 'undefined') {
                console.error("TradingView库未加载");
                setTimeout(() => this.initTradingView(), 1000);
                return;
            }

            this.tradingViewManager = new TradingViewManager(this.websocketManager);
            window.tvWidget = this.tradingViewManager.initWidget();
            window.tvWidget.headerReady().then(() => {
                window.tvWidget.activeChart().createStudy("MACD", false, false, {
                    in_0: 13,
                    in_1: 31,
                    in_2: 11,
                    in_3: "close"
                });
                //window.tvWidget.activeChart().createStudy("Volume", true);

                window.tvWidget.activeChart().createStudy('Moving Average Exponential', false, false, {length: Config.EMA_LENGTH});
                this.tradingViewManager.createHeaderButtons();
                this.tradingViewManager.setupChartEvents();
            });
        }

        initPythonTerminal() {
            this.pythonTerminalManager = new PythonTerminalManager(this.websocketManager);
            window.pythonTerminalManager = this.pythonTerminalManager;
        }
    }

    // ============ 启动应用 ============
    window.addEventListener("DOMContentLoaded", () => {
        new App().init();
    });
    </script>
